<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screenshot 4 — Friends Feed</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1284px;
    height: 2778px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .frame {
    width: 1284px;
    height: 2778px;
    background: #000000;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .frame::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 600px;
    background: linear-gradient(180deg, rgba(78, 234, 172, 0.06) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }
  .frame-text {
    position: relative;
    z-index: 2;
    text-align: center;
    padding-top: 160px;
    padding-bottom: 60px;
  }
  .frame-headline {
    font-size: 96px;
    font-weight: 800;
    color: #FFFFFF;
    letter-spacing: -2px;
    line-height: 1.1;
    margin-bottom: 24px;
  }
  .frame-subline {
    font-size: 42px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.55);
    letter-spacing: -0.5px;
  }
  .phone-container {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 20px;
  }
  .phone-bezel {
    width: 920px;
    height: 1880px;
    background: #1C1C1E;
    border-radius: 90px;
    padding: 18px;
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.08),
      0 60px 120px rgba(0,0,0,0.6),
      0 20px 60px rgba(0,0,0,0.4);
    position: relative;
  }
  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 72px;
    overflow: hidden;
    background: #000;
  }
  .phone-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }
  .phone-bezel::after {
    content: '';
    position: absolute;
    top: 38px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 55px;
    background: #000;
    border-radius: 30px;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="frame-text">
    <div class="frame-headline">Work Out<br>Together</div>
    <div class="frame-subline">Share photos & hype up your friends</div>
  </div>
  <div class="phone-container">
    <div class="phone-bezel">
      <div class="phone-screen">
        <img src="screenshots/feed.png" alt="Friends Feed">
      </div>
    </div>
  </div>
</div>
</body>
</html>
